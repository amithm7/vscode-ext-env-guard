name: CI

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    name: 🚀 Publish
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - name: Install deps
        run: pnpm ci || pnpm install --frozen-lockfile

      - name: Package
        run: |
          pnpm exec vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          pnpm exec vsce publish --packagePath *.vsix --skip-duplicate

      - name: Publish to open-vsx.org
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          pnpm exec ovsx publish *.vsix --pat "${OVSX_PAT}" --skip-duplicate
